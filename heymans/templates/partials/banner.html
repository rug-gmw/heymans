<!-- top banner with logos -->
<div class="header-banner">

  <img src="{{ url_for('static', filename='university-logo--en.svg') }}" alt="University Logo" class="logo">
  <div class="banner-right">

    <div class="heymans-banner">
    Heymans AI tutor (beta)
    </div>
    {% if session.name %}
    <div class="user-banner">
        <img src="{{ url_for('static', filename='divider.svg') }}" class="inline-divider" />
        <span class="username">{{ session.name }}</span>
        <img src="{{ url_for('static', filename='divider.svg') }}" class="inline-divider" />
        <a href="{{ url_for('app.logout') }}" class="regular-button">Log out</a>
        <!-- img src="{{ url_for('static', filename='divider.svg') }}" class="inline-divider" / -->
    </div>
    {% endif %}

    <!-- img src="{{ url_for('static', filename='Dall-E_heymans.svg') }}" alt="Profile Drawing" class="profile" -->
  </div>
</div>

<!-- top menu with functionality -->
<div class="top-menu">
  <ul>
    <li>
      <a
        href="{{ url_for('app.quiz') }}"
        class="nav-link {% if request.endpoint == 'app.quiz' %}active{% endif %}"
      >
        Grading
      </a>
    </li>
    <li>
      <a
        href="{{ url_for('app.kb') }}"
        class="nav-link {% if request.endpoint == 'app.kb' %}active{% endif %}"
      >
        Library
      </a>
    </li>
    <li>
      <a
        href="{{ url_for('app.iquiz') }}"
        class="nav-link {% if request.endpoint == 'app.iquiz' %}active{% endif %}"
      >
        Chat Quiz
      </a>
    </li>
    <li>
      <span class="nav-link disabled">
        Q&amp;A
      </span>
    </li>
  </ul>
</div>

<div class="divider"></div>
