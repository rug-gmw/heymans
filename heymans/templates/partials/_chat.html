{% raw %}
<div id="app" class="chat-page">
  <div class="chat-container">
    
    <div class="focus-object-line chat-topline">
      <h2>{{ chatTitle }}</h2>

      <div class="chat-top-actions">
        <p class="heymans-msg">{{ chatStatus }}</p>

        <button
          class="regular-button"
          @click="restartChat"
          :disabled="isStarting || isSending"
        >
          Restart Chat
        </button>
      </div>
    </div>

    <div class="chat-window" ref="chatWindow">
      <div
        v-for="(message, index) in messages"
        :key="index"
        class="chat-message"
        :class="message.role"
      >
        <div class="chat-bubble">
          <strong>{{ message.role === 'assistant' ? 'Tutor' : 'You' }}:</strong>
          <div v-html="renderMarkdown(message.text)"></div>
        </div>
      </div>
    </div>

    <div class="chat-input-area">
      <textarea
        v-model="draftMessage"
        :disabled="isSending || isFinished || !conversationId || !token"
        placeholder="Type your answer here..."
        @keydown.enter.exact.prevent="sendMessage"
      ></textarea>

      <div class="button-row">
        <button
          class="llm-button"
          @click="sendMessage"
          :disabled="isSending || isFinished || !draftMessage.trim() || !conversationId || !token"
        >
          {{ isSending ? 'Sending...' : 'Send' }}
        </button>
      </div>
    </div>

  </div>
</div>
{% endraw %}
